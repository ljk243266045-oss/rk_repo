{# Renders left-side chapter navigation. #}
<aside class="lg:col-span-1 bg-white rounded-lg shadow p-4 sticky top-20 max-h-[80vh] overflow-y-auto text-sm">
  {% for book, book_name, chs in books %}
    <div class="mb-3">
      <div class="font-bold text-indigo-700 mb-1">第{{ book }}篇 {{ book_name }}</div>
      <ul class="space-y-0.5">
        {% for c in chs %}
          <li>
            <a href="/notes/{{ c.chapter_no }}"
               class="block px-2 py-1 rounded hover:bg-indigo-50
                      {% if active and active.id == c.id %}bg-indigo-100 text-indigo-800 font-semibold{% endif %}">
              第{{ c.chapter_no }}章 {{ c.title }}
            </a>
          </li>
        {% endfor %}
      </ul>
    </div>
  {% endfor %}
</aside>
